<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Valencia Tour - Kincskereső</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; margin: 0; display: flex; justify-content: center; padding: 20px; }
        .card { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 400px; text-align: center; }
        .btn { background: #007bff; color: white; border: none; padding: 12px; border-radius: 8px; font-size: 16px; cursor: pointer; width: 100%; margin-top: 10px; }
        .hidden { display: none !important; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        #status { font-size: 13px; color: #666; margin-bottom: 15px; font-style: italic; }
        #success-screen { text-align: center; display: flex; flex-direction: column; align-items: center; }
        #reward-image { width: 100%; max-width: 200px; border-radius: 15px; margin: 20px 0; }
    </style>
</head>
<body>
<div class="card">
    <h2 id="task-title">Betöltés...</h2>
    <div id="status">GPS inicializálása...</div>
    
    <div id="game-ui" class="hidden">
        <p id="task-desc"></p>
        <div id="text-quiz-area" class="hidden">
            <p id="text-question" style="font-weight: bold;"></p>
            <input type="text" id="textInput" placeholder="Válasz...">
            <button class="btn" onclick="checkTextAnswer()">Beküldés</button>
        </div>
        <div id="photo-area" class="hidden">
            <input type="file" id="cameraInput" accept="image/*" capture="camera">
        </div>
        <div id="quiz-area" class="hidden">
            <img id="quiz-image" style="width:100%">
            <input type="text" id="quizInput">
            <button class="btn" onclick="checkQuizAnswer()">OK</button>
        </div>
        <div id="puzzle-area" class="hidden">
            <div id="puzzle-grid" style="display:grid; grid-template-columns: repeat(3, 1fr); gap:2px;"></div>
        </div>
    </div>

    <div id="success-screen" class="hidden">
        <h2 style="color: #28a745;">SIKERÜLT! 🏆</h2>
        <img id="reward-image" src="">
        <p>Ezt is megoldottad!</p>
        <div id="success-info" style="font-weight: bold;"></div>
        <button class="btn" style="background:#28a745;" onclick="proceedToNextLocation()">TOVÁBB</button>
    </div>

    <div id="finish-screen" class="hidden">
        <h2>Gratulálok!</h2>
        <div id="final-results"></div>
    </div>
</div>
<script src="app.js"></script>
</body>
</html>
