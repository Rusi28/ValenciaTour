<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Valencia Tour - Kincskereső</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; margin: 0; display: flex; justify-content: center; padding: 20px; }
        .card { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 400px; text-align: center; }
        .btn { background: #007bff; color: white; border: none; padding: 12px; border-radius: 8px; font-size: 16px; cursor: pointer; width: 100%; margin-top: 10px; }
        .hidden { display: none; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        #status { font-size: 13px; color: #666; margin-bottom: 15px; font-style: italic; }
        .quiz-img { width: 100%; border-radius: 10px; transition: filter 0.5s ease; margin-bottom: 10px; }
        .blur { filter: blur(15px); } /* Ez csinálja a homályosítást */
    </style>
</head>
<body>

<div class="card">
    <h2 id="task-title">Betöltés...</h2>
    <div id="status">GPS inicializálása...</div>
    
    <div id="game-ui" class="hidden">
        <p id="task-desc"></p>
        
        <div id="photo-area" class="hidden">
            <input type="file" id="cameraInput" accept="image/*" capture="camera">
            <p style="font-size: 12px;">Készíts fotót a továbblépéshez!</p>
        </div>

        <div id="quiz-area" class="hidden">
            <p id="quiz-progress"></p>
            <img id="quiz-image" class="quiz-img blur" src="">
            <div id="quiz-input-group">
                <input type="text" id="quizInput" placeholder="Melyik város ez?">
                <button class="btn" onclick="checkQuizAnswer()">Ellenőrzés</button>
            </div>
            <button id="next-quiz-btn" class="btn hidden" style="background:#28a745;" onclick="nextQuizStep()">Következő kép</button>
        </div>

        <div id="answer-area" class="hidden">
            <input type="text" id="wordInput" placeholder="A megoldó szó...">
            <button class="btn" onclick="checkWord()">Beküldés</button>
        </div>
    </div>

    <div id="finish-screen" class="hidden">
        <h2>Gratulálok!</h2>
        <div id="final-results"></div>
    </div>
</div>

<script src="app.js"></script>
</body>
</html>
