<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Valencia Tour - Kincskereső</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f0f2f5; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100-vh; padding: 20px; }
        .card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 400px; text-align: center; }
        .btn { background: #007bff; color: white; border: none; padding: 12px 20px; border-radius: 8px; font-size: 16px; cursor: pointer; width: 100%; margin-top: 10px; }
        .btn:disabled { background: #ccc; }
        .hidden { display: none; }
        input[type="text"], input[type="file"] { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        #status { font-size: 14px; color: #666; margin-bottom: 15px; }
    </style>
</head>
<body>

<div class="card">
    <h2 id="task-title">Betöltés...</h2>
    <div id="status">Várakozás a GPS-re...</div>
    
    <div id="game-ui" class="hidden">
        <p id="task-desc"></p>
        
        <!-- Fotó részleg -->
        <div id="photo-area">
            <p><strong>1. lépés:</strong> Készíts egy fotót!</p>
            <input type="file" id="cameraInput" accept="image/*" capture="camera">
        </div>

        <!-- Megoldás részleg -->
        <div id="answer-area" class="hidden">
            <p><strong>2. lépés:</strong> Mi a megoldó szó?</p>
            <input type="text" id="wordInput" placeholder="Ide írd a szót...">
            <button class="btn" onclick="checkWord()">Beküldés</button>
        </div>
    </div>

    <div id="finish-screen" class="hidden">
        <h2>Gratulálok!</h2>
        <p>Megfejtetted a rejtélyt. A szavaid:</p>
        <div id="final-crossword" style="font-weight: bold; letter-spacing: 2px;"></div>
    </div>
</div>

<script>
    // IDE ÍRD BE A FELADATAIDAT (Koordináták, Leírás, Megoldás)
    const tasks = [
        { title: "A Hősök Tere", desc: "Keresd meg az oroszlánt!", lat: 47.8157, lng: 19.0769, answer: "OROSZLÁN" },
        { title: "A Titkos Kút", desc: "Milyen állat van a kúton?", lat: 47.5000, lng: 19.0500, answer: "HAL" }
    ];

    let currentIdx = 0;
    let solvedWords = [];

    // GPS Figyelés
    if (navigator.geolocation) {
        navigator.geolocation.watchPosition(position => {
            const userLat = position.coords.latitude;
            const userLng = position.coords.longitude;
            const target = tasks[currentIdx];

            const dist = getDistance(userLat, userLng, target.lat, target.lng);

            if (dist < 20) { // 20 méteres körzet
                document.getElementById('status').innerText = "📍 Megérkeztél a helyszínre!";
                showTask();
            } else {
                document.getElementById('status').innerText = `📍 Menj közelebb! Távolság: ${Math.round(dist)}m`;
                document.getElementById('game-ui').classList.add('hidden');
            }
        }, err => {
            document.getElementById('status').innerText = "Hiba: Engedélyezd a GPS-t!";
        }, { enableHighAccuracy: true });
    }

    function showTask() {
        document.getElementById('game-ui').classList.remove('hidden');
        document.getElementById('task-title').innerText = tasks[currentIdx].title;
        document.getElementById('task-desc').innerText = tasks[currentIdx].desc;
    }

    // Fotó érzékelése
    document.getElementById('cameraInput').addEventListener('change', function() {
        if (this.files.length > 0) {
            document.getElementById('answer-area').classList.remove('hidden');
        }
    });

    function checkWord() {
        const val = document.getElementById('wordInput').value.toUpperCase().trim();
        if (val === tasks[currentIdx].answer) {
            solvedWords.push(val);
            currentIdx++;
            if (currentIdx < tasks.length) {
                alert("Helyes! Irány a következő pont.");
                resetUI();
            } else {
                showFinish();
            }
        } else {
            alert("Sajnos nem ez a jó szó!");
        }
    }

    function resetUI() {
        document.getElementById('game-ui').classList.add('hidden');
        document.getElementById('answer-area').classList.add('hidden');
        document.getElementById('wordInput').value = "";
        document.getElementById('cameraInput').value = "";
    }

    function showFinish() {
        document.querySelector('.card').innerHTML = `
            <h2>Keresztrejtvény kész!</h2>
            <div style="font-family: monospace; font-size: 20px;">
                ${solvedWords.join('<br>')}
            </div>
            <p><strong>Végső megoldás: VALENCIA</strong></p>
        `;
    }

    // Távolság kalkulátor (Haversine formula)
    function getDistance(lat1, lon1, lat2, lon2) {
        const R = 6371e3;
        const φ1 = lat1 * Math.PI/180;
        const φ2 = lat2 * Math.PI/180;
        const Δφ = (lat2-lat1) * Math.PI/180;
        const Δλ = (lon2-lon1) * Math.PI/180;
        const a = Math.sin(Δφ/2) * Math.sin(Δφ/2) + Math.cos(φ1) * Math.cos(φ2) * Math.sin(Δλ/2) * Math.sin(Δλ/2);
        return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
    }
</script>
</body>
</html>
